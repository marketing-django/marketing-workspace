site_name: Django marketing workspace
repo_url: https://github.com/marketing-django/marketing-workspace
site_url: https://marketing-django.github.io/marketing-workspace/
docs_dir: docs
edit_uri: edit/main/docs

site_description: A shared workspace to support our work on a new marketing strategy for Django and follow-on marketing activities.
repo_name: marketing-workspace
dev_addr: localhost:8001
theme:
  name: material
  font: false
  logo: theme/favicon.png
  favicon: theme/favicon.png
  palette:
    scheme: default
    primary: white
  features:
    - content.code.copy
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - content.tooltips
    - search.highlight
    - search.suggest
    - search.share
  custom_dir: docs/theme
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - sane_lists
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  # Appends docs/contributing/abbreviations.md to every page.
  - pymdownx.snippets:
      base_path: docs
      auto_append:
        - contributing/abbreviations.md
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
plugins:
  - search
  - git-revision-date-localized:
      type: date
      # Use the build date for files not yet committed, so `--strict` builds pass.
      fallback_to_build_date: true
  - llmstxt:
      full_output: llms-full.txt
      # Keep in sync with nav.
      sections:
        Home:
          - index.md
        Contributing:
          - contributing/*.md
        Knowledge base:
          - knowledge-base/*.md
        Marketing strategy:
          - marketing-strategy/*.md
        Website redesign:
          - website-redesign/*.md
# Treat structural mistakes as warnings, so `--strict` builds fail on them.
validation:
  nav:
    # Every docs page must be in nav, or marked with `not_in_nav` front matter.
    omitted_files: warn
    absolute_links: warn
  links:
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn
nav:
  - Home: index.md
  - Contributing:
      - contributing/README.md
      - Documentation style guide: contributing/style-guide.md
      - Quality assurance: contributing/quality-assurance.md
      - Project architecture: contributing/architecture.md
      - Abbreviations: contributing/abbreviations.md
  - Knowledge base:
      - knowledge-base/README.md
      - Teams: knowledge-base/organisation/teams.md
  - Marketing strategy:
      - marketing-strategy/README.md
      - Draft:
          - marketing-strategy/draft/README.md
          - SWOT analysis: marketing-strategy/draft/swot.md
      - Competitors analysis:
          - marketing-strategy/competitors-analysis/README.md
          - Django self-audit: marketing-strategy/competitors-analysis/django-self-audit.md
          - FastAPI: marketing-strategy/competitors-analysis/fastapi.md
          - Next.js: marketing-strategy/competitors-analysis/next-js.md
          - Next.js full draft: marketing-strategy/competitors-analysis/next-js-full.md
          - Ruby on Rails: marketing-strategy/competitors-analysis/ruby-on-rails.md
          - Source map template: marketing-strategy/competitors-analysis/template-competitor-source-map.md
          - Analysis template: marketing-strategy/competitors-analysis/template-competitor-analysis.md
      - Governance:
          - Marketing WG charter: marketing-strategy/governance/marketing-wg-charter.md
      - Research:
          - Formats: marketing-strategy/research/formats.md
      - Resources: marketing-strategy/resources/README.md
  - Website redesign:
      - website-redesign/README.md
      - Redesign announcement: website-redesign/redesign-announcement.md
